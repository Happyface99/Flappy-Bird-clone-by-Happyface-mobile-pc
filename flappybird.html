<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #70c5ce; }
        #gameArea { position: relative; width: 100vw; height: 100vh; }
        #bird { position: absolute; width: 40px; height: 40px; background: #f4d03f; border-radius: 50%; left: 50px; top: 200px; z-index: 10; }
        .pipe { position: absolute; width: 60px; background: #2ecc71; z-index: 5; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 24px; color: white; z-index: 20; }
        #jumpBtn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; background: #e74c3c; color: white; border: none; z-index: 30; }
        #gameOver { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; z-index: 40; }
    </style>
</head>
<body onclick="jump()">
    <div id="gameArea">
        <div id="score">0</div>
        <div id="bird"></div>
        <div id="gameOver"><h1>Game Over</h1><p>Tap to Restart</p></div>
        <button id="jumpBtn" onclick="jump()">JUMP</button>
    </div>
    <script>
        const bird = document.getElementById("bird"), gameArea = document.getElementById("gameArea"), scoreElement = document.getElementById("score"), gameOverScreen = document.getElementById("gameOver");
        let birdY = 200, velocity = 0, gravity = 0.3, score = 0, isGameOver = false, pipes = [];
        function jump() { if (isGameOver) { resetGame(); return; } velocity = -6; }
        function createPipe() {
            let topHeight = Math.random() * (window.innerHeight - 200) + 50, gap = 150;
            let pipeTop = document.createElement("div"), pipeBottom = document.createElement("div");
            pipeTop.className = "pipe"; pipeTop.style.height = topHeight + "px"; pipeTop.style.left = window.innerWidth + "px";
            pipeBottom.className = "pipe"; pipeBottom.style.height = (window.innerHeight - topHeight - gap) + "px"; pipeBottom.style.bottom = "0"; pipeBottom.style.left = window.innerWidth + "px";
            gameArea.appendChild(pipeTop); gameArea.appendChild(pipeBottom);
            pipes.push({ top: pipeTop, bottom: pipeBottom, left: window.innerWidth, passed: false });
        }
        function gameLoop() {
            if (isGameOver) return;
            velocity += gravity; birdY += velocity; bird.style.top = birdY + "px";
            if (birdY < 0 || birdY > window.innerHeight - 40) endGame();
            pipes.forEach((pipe, index) => {
                pipe.left -= 3; pipe.top.style.left = pipe.left + "px"; pipe.bottom.style.left = pipe.left + "px";
                if (!pipe.passed && pipe.left < 50) { score++; scoreElement.innerText = score; pipe.passed = true; }
                if (pipe.left < 90 && pipe.left > 10 && (birdY < parseInt(pipe.top.style.height) || birdY > window.innerHeight - parseInt(pipe.bottom.style.height) - 40)) endGame();
                if (pipe.left < -60) { pipe.top.remove(); pipe.bottom.remove(); pipes.splice(index, 1); }
            });
            requestAnimationFrame(gameLoop);
        }
        function endGame() { isGameOver = true; gameOverScreen.style.display = "block"; }
        function resetGame() {
            isGameOver = false; birdY = 200; velocity = 0; score = 0; scoreElement.innerText = score; gameOverScreen.style.display = "none";
            pipes.forEach(pipe => { pipe.top.remove(); pipe.bottom.remove(); }); pipes = []; gameLoop();
        }
        setInterval(createPipe, 2000); gameLoop();
    </script>
</body>
</html>
