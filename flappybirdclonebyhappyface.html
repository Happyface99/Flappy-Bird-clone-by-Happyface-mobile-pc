<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird Clone by Happyface</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #70c5ce; }
    #gameArea { position: relative; width: 100vw; height: 100vh; display: none; }

    /* Bird now uses transparent bird.png */
    #bird {
      position: absolute;
      width: 40px;
      height: 40px;
      background: url("bird.png") no-repeat center center;
      background-size: contain;
      left: 50px;
      top: 200px;
      z-index: 10;
    }

    .pipe { position: absolute; width: 60px; background: #2ecc71; z-index: 5; }
    #score { position: absolute; top: 10px; left: 10px; font-size: 24px; color: white; z-index: 20; }
    #jumpBtn { display: none; }
    #intro { position: absolute; width: 100vw; height: 100vh; background: #34495e; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    #intro h1 { font-size: 32px; margin-bottom: 20px; }
    #startBtn { padding: 15px 30px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Intro Screen -->
  <div id="intro">
    <h1>Flappy Bird Clone by Happyface</h1>
    <button id="startBtn">Start Game</button>
  </div>

  <!-- Game Area -->
  <div id="gameArea" onclick="jump()">
    <div id="score">0</div>
    <div id="bird"></div>
    <button id="jumpBtn" onclick="jump()">JUMP</button>
  </div>

  <script>
    const bird = document.getElementById("bird"),
          gameArea = document.getElementById("gameArea"),
          scoreElement = document.getElementById("score"),
          introScreen = document.getElementById("intro"),
          startBtn = document.getElementById("startBtn");

    let birdY = 200, velocity = 0, gravity = 0.3, score = 0, isGameOver = false, pipes = [], pipeInterval;

    function jump() { if (isGameOver) return; velocity = -6; }

    function createPipe() {
      let topHeight = Math.random() * (window.innerHeight - 200) + 50, gap = 150;
      let pipeTop = document.createElement("div"), pipeBottom = document.createElement("div");
      pipeTop.className = "pipe"; pipeTop.style.height = topHeight + "px"; pipeTop.style.left = window.innerWidth + "px";
      pipeBottom.className = "pipe"; pipeBottom.style.height = (window.innerHeight - topHeight - gap) + "px"; pipeBottom.style.bottom = "0"; pipeBottom.style.left = window.innerWidth + "px";
      gameArea.appendChild(pipeTop); gameArea.appendChild(pipeBottom);
      pipes.push({ top: pipeTop, bottom: pipeBottom, left: window.innerWidth, passed: false });
    }

    function gameLoop() {
      if (isGameOver) return;
      velocity += gravity; birdY += velocity; bird.style.top = birdY + "px";
      if (birdY < 0 || birdY > window.innerHeight - 40) endGame();
      pipes.forEach((pipe, index) => {
        pipe.left -= 3; pipe.top.style.left = pipe.left + "px"; pipe.bottom.style.left = pipe.left + "px";
        if (!pipe.passed && pipe.left < 50) { score++; scoreElement.innerText = score; pipe.passed = true; }
        if (pipe.left < 90 && pipe.left > 10 && (birdY < parseInt(pipe.top.style.height) || birdY > window.innerHeight - parseInt(pipe.bottom.style.height) - 40)) endGame();
        if (pipe.left < -60) { pipe.top.remove(); pipe.bottom.remove(); pipes.splice(index, 1); }
      });
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      isGameOver = true;
      clearInterval(pipeInterval);
      pipes.forEach(pipe => { pipe.top.remove(); pipe.bottom.remove(); });
      pipes = [];
      gameArea.style.display = "none";
      introScreen.style.display = "flex";
    }

    function startGame() {
      introScreen.style.display = "none";
      gameArea.style.display = "block";
      isGameOver = false; birdY = 200; velocity = 0; score = 0;
      scoreElement.innerText = score;
      bird.style.top = birdY + "px";
      pipeInterval = setInterval(createPipe, 2000);
      gameLoop();
    }

    // Start button logic
    startBtn.addEventListener("click", startGame);

    // Spacebar support for both starting and jumping
    document.addEventListener("keydown", function(event) {
      if (event.code === "Space") {
        event.preventDefault(); // prevent page scrolling
        if (introScreen.style.display !== "none") {
          startGame();
        } else {
          jump();
        }
      }
    });
  </script>
</body>
</html>
